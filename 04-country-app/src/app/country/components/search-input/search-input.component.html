<section class="flex flex-row gap-2 mt-2">
  <input
    type="text"
    class="input input-bordered mr-2 w-56"
    [placeholder]="placeholderText()"
    autofocus
    #txtSearch
    (keyup)="inputValue.set(txtSearch.value)"
    [value]="inputValue()"
    />

    <button
      class="btn btn-primary"
      (click)="searchValue.emit(txtSearch.value)">
      Search
    </button>
</section>
